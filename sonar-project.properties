# Sonar scanner configuration for Week 1 - placeholders should be set via CI secrets
# Replace projectKey and organization with your SonarCloud or SonarQube values.

sonar.projectKey=ENTERPRISE-ECOMMERCE:repo-placeholder
sonar.organization=org-placeholder
sonar.projectName=Enterprise E-commerce DevSecOps Pipeline

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.js

# Coverage report path (Jest lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language-specific settings
sonar.language=js

# Wait for quality gate (set via CI args: -Dsonar.qualitygate.wait=true)
# Additional rules/quality profiles are configured on the Sonar server
# SonarCloud Project Configuration
sonar.projectKey=ecommerce-devsecops-pipeline
sonar.organization=tryhackmeacct-netizen
sonar.host.url=https://sonarcloud.io

# Source and Test Directories
sonar.sources=src
sonar.tests=tests

# Code Exclusions
# Exclude node_modules, coverage files, and the isolated security demos (to prevent local secure code demos from failing the live gate)
sonar.exclusions=node_modules/**, coverage/**, src/security-demos/**

# Test Coverage Paths
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
