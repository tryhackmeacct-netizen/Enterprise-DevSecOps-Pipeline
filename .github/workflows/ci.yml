on:
jobs:
name: CI/CD Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build, Test, and SAST (Week 1)
    runs-on: ubuntu-latest

    env:
      # SonarCloud/SonarQube host can be overridden by setting this secret.
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      # --- STEP 1: Checkout the repository ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for Sonar to analyze SCM information

      # --- STEP 2: Setup Node.js environment (with npm cache) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- STEP 3: Install dependencies ---
      # Use lockfile if present, otherwise fall back to `npm install`.
      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # --- STEP 4: Run unit tests and collect coverage ---
      - name: Run Unit Tests
        run: npm test

      # --- STEP 5: Fail fast on critical/high npm audit issues ---
      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=high

      # --- STEP 6: Build a local Docker image for verification ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ecommerce-app:ci

      # --- STEP 7: Sonar SAST Scan (conditional) ---
      # This step runs only when SONAR_TOKEN is provided in repository secrets.
      # It passes `-Dsonar.qualitygate.wait=true` so the scanner waits for
      # the Quality Gate result and fails the job if the gate is not GREEN.
      - name: SonarCloud / SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarcloud-github-action@v1
        with:
          args: >
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true

      # --- STEP 8: Sonar Quality Gate check (fails job if QC not OK) ---
      # When using SonarScanner with `sonar.qualitygate.wait=true` the scanner
      # will return non-zero on a failed quality gate. This extra step is kept
      # for clearer reporting and artifact generation.
      - name: Sonar Quality Gate Status (capture)
        if: ${{ secrets.SONAR_TOKEN != '' }}
        id: sonar_qg
        run: echo "quality-gate-check-complete"

      # --- STEP 9: Collect artifacts and reports ---
      - name: Upload Test Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/

      - name: Upload Pipeline Summary
        if: always()
        run: |
          mkdir -p docs
          echo "Enterprise DevSecOps Pipeline Report" > docs/pipeline-report.txt
          echo "Timestamp: $(date -u)" >> docs/pipeline-report.txt
          echo "Commit SHA: ${{ github.sha }}" >> docs/pipeline-report.txt
          echo "Sonar Scan Performed: ${{ secrets.SONAR_TOKEN != '' }}" >> docs/pipeline-report.txt
          echo "==========================================" >> docs/pipeline-report.txt
          cat docs/pipeline-report.txt

      - name: Upload Pipeline Summary Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: docs/pipeline-report.txt

