name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-pipeline:
    name: Build, Test, SAST, SCA, Container, IaC
    runs-on: ubuntu-latest

    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: SonarCloud / SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v4
        with:
          args: >
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true

      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ecommerce-app:ci

      - name: Scan dependencies and local filesystem with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library,os
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          ignore-unfixed: true
          skip-dirs: .venv

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ecommerce-app:ci
          vuln-type: library,os
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          ignore-unfixed: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Run Checkov IaC Scan (Secure Infrastructure)
        uses: bridgecrew/checkov-action@v12.2890.0
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli
          quiet: false
          soft_fail: false

      - name: Run Checkov IaC Scan (Insecure Infrastructure - Demo)
        uses: bridgecrew/checkov-action@v12.2890.0
        with:
          directory: infra/terraform-insecure
          framework: terraform
          output_format: cli
          quiet: false
          soft_fail: true
          skip_check: CKV_AWS_272

      - name: Upload Test Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/

      - name: Upload Pipeline Summary
        if: always()
        run: |
          mkdir -p docs
          cat > docs/pipeline-report.txt << EOF
          Enterprise DevSecOps Pipeline Report
          Timestamp: $(date -u)
          Commit SHA: ${{ github.sha }}
          Sonar Scan Performed: true
          Trivy Scan Performed: true
          Checkov IaC Scan Performed: true
          Terraform Validated: true
          ==========================================
          EOF

      - name: Upload Pipeline Summary Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: docs/pipeline-report.txt
